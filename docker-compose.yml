services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qc-db-app
    restart: unless-stopped
    ports:
      - "1002:80"
    volumes:
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=qc_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: qc-db-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: qc_db
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - qc_db_data:/var/lib/mysql

volumes:
  qc_db_data:
